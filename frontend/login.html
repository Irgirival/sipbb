<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — SIPBB Desa Kasomalang Kulon</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --h:#1a4731;--h2:#2d6a4f;--h3:#52b788;--h4:#d8f3dc;
  --g:#c9a84c;--g2:#f0c040;
  --r:#dc2626;--b:#2563eb;--o:#ea580c;--pu:#7c3aed;
  --bg:#f0f4f0;--putih:#fff;--tx:#1c1c1c;--ab:#6b7280;--br:#e5ede8;
  --sidebar:240px;
}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex}

/* LOGIN */
#login-screen{
  position:fixed;inset:0;background:linear-gradient(135deg,#0d2419,#1a4731);
  display:flex;align-items:center;justify-content:center;z-index:9999;
  flex-direction:column;gap:0
}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{width:64px;height:64px;background:linear-gradient(135deg,var(--g),var(--g2));border-radius:16px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:30px}
.login-logo h1{font-size:1.25rem;font-weight:800;color:var(--h)}
.login-logo p{font-size:.78rem;color:var(--ab);margin-top:3px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--h)}
.fg input,.fg select,.fg textarea{padding:11px 14px;border:1.5px solid var(--br);border-radius:9px;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fff;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--h2);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.fg textarea{resize:vertical;min-height:80px}
.btn{padding:11px 20px;border:none;border-radius:9px;font-size:.87rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,var(--h),var(--h2));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,71,49,.3)}
.btn-full{width:100%;justify-content:center;padding:13px}
.btn-danger{background:#fee2e2;color:var(--r)}
.btn-danger:hover{background:var(--r);color:#fff}
.btn-outline{background:#fff;border:1.5px solid var(--br);color:var(--tx)}
.btn-outline:hover{border-color:var(--h2);color:var(--h2)}
.btn-gold{background:linear-gradient(135deg,var(--g),var(--g2));color:var(--h)}
.btn-sm{padding:6px 12px;font-size:.76rem}
.btn-xs{padding:4px 9px;font-size:.7rem;border-radius:6px}
.err-msg{background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:.8rem;display:none;margin-bottom:12px}
.err-msg.show{display:block}

/* LAYOUT */
#app{display:flex;width:100%;display:none}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar);flex-shrink:0;background:var(--h);
  min-height:100vh;display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:200;
  transition:transform .3s
}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo .icon{width:38px;height:38px;background:linear-gradient(135deg,var(--g),var(--g2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px}
.sb-logo h2{font-size:.82rem;font-weight:800;color:#fff;line-height:1.3}
.sb-logo p{font-size:.65rem;color:rgba(255,255,255,.45);margin-top:2px}
.sb-user{padding:12px 16px;background:rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--h3),var(--h2));display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0}
.sb-user-info .name{font-size:.78rem;font-weight:700;color:#fff}
.sb-user-info .role{font-size:.63rem;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-section{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.3);padding:10px 8px 6px;margin-top:6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.7);font-size:.82rem;font-weight:500;margin-bottom:2px;text-decoration:none}
.sb-item:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:700}
.sb-item .ico{width:18px;text-align:center;font-size:15px;flex-shrink:0}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.sb-logout{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.5);font-size:.78rem;cursor:pointer;padding:8px;border-radius:8px;transition:all .2s}
.sb-logout:hover{background:rgba(255,100,100,.15);color:#fca5a5}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--br);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar h1{font-size:.95rem;font-weight:700;color:var(--h)}
.topbar-right{display:flex;align-items:center;gap:12px}
.content{padding:24px 28px;flex:1}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:700}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-orange{background:#fed7aa;color:#9a3412}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f3f4f6;color:#6b7280}
.badge-pu{background:#ede9fe;color:#6d28d9}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:20px;border:1.5px solid var(--br);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;right:-16px;bottom:-16px;width:70px;height:70px;border-radius:50%;background:var(--h4);opacity:.6}
.stat-card .ico{font-size:22px;margin-bottom:10px}
.stat-card .val{font-size:1.8rem;font-weight:900;color:var(--h);letter-spacing:-1px;font-variant-numeric:tabular-nums}
.stat-card .lbl{font-size:.72rem;color:var(--ab);text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
.stat-card.red .val{color:var(--r)}
.stat-card.gold .val{color:var(--g)}
.stat-card.blue .val{color:var(--b)}
.stat-card.pu .val{color:var(--pu)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{background:#f5f8f5;padding:9px 13px;text-align:left;font-weight:700;color:var(--h);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--br);white-space:nowrap}
tbody tr{border-bottom:1px solid #f5f7f5;transition:background .1s}
tbody tr:hover{background:var(--h4)}
td{padding:9px 13px;vertical-align:middle}
td.mono{font-family:monospace;font-size:.75rem;color:var(--ab)}
td.bold{font-weight:600}
.empty-row td{text-align:center;padding:40px;color:var(--ab);font-size:.85rem}

/* PANEL */
.panel{background:#fff;border-radius:14px;border:1.5px solid var(--br);margin-bottom:20px;overflow:hidden}
.panel-hd{padding:14px 20px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.panel-hd h3{font-size:.88rem;font-weight:700;color:var(--h)}
.panel-body{padding:20px}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1.5px solid var(--br);border-radius:8px;font-size:.83rem;font-family:inherit;outline:none;background:#fff;flex:1;min-width:120px}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--h2)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:800;padding:20px;overflow-y:auto}
.overlay.on{display:flex;align-items:flex-start;justify-content:center}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hd{padding:16px 22px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:.92rem;font-weight:700;color:var(--h)}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--ab);line-height:1}
.modal-close:hover{color:var(--tx)}
.modal-body{padding:22px;display:flex;flex-direction:column;gap:13px}
.modal-ft{padding:14px 22px;border-top:1px solid var(--br);display:flex;gap:8px;justify-content:flex-end}

/* PAGINATION */
.pg{display:flex;align-items:center;justify-content:center;gap:4px;padding:12px;border-top:1px solid var(--br);flex-wrap:wrap}
.pg button{background:#fff;border:1.5px solid var(--br);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .15s;font-family:inherit}
.pg button:hover:not(:disabled){border-color:var(--h2);color:var(--h2)}
.pg button:disabled{opacity:.3;cursor:not-allowed}
.pg button.on{background:var(--h2);color:#fff;border-color:var(--h2)}
.pg-info{font-size:.73rem;color:var(--ab)}

/* UPLOAD AREA */
.drop-zone{border:2px dashed var(--br);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
.drop-zone:hover,.drop-zone.drag{border-color:var(--h2);background:var(--h4)}
.drop-zone input{display:none}
.drop-zone p{font-size:.82rem;color:var(--ab);margin-top:8px}
.drop-zone .main-text{font-size:.88rem;font-weight:600;color:var(--h)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--h);color:#fff;padding:11px 18px;border-radius:10px;font-size:.83rem;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:all .3s;max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:#dc2626}
.toast.ok{background:#16a34a}

/* ROLE BADGE */
.role-admin{background:linear-gradient(135deg,var(--h),var(--h2));color:#fff;padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:700}
.role-kolektor{background:linear-gradient(135deg,var(--b),#1d4ed8);color:#fff;padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:700}
.role-rt{background:linear-gradient(135deg,var(--o),#c2410c);color:#fff;padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:700}

/* PEMBAYARAN CARD */
.bayar-card{border:1.5px solid var(--br);border-radius:12px;padding:16px;margin-bottom:12px;transition:all .2s}
.bayar-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.bayar-card.pending{border-left:3px solid var(--o)}
.bayar-card.approved{border-left:3px solid #16a34a}
.bayar-card.rejected{border-left:3px solid var(--r)}
.bayar-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.bayar-nama{font-weight:700;font-size:.9rem}
.bayar-nop{font-size:.72rem;color:var(--ab);font-family:monospace}
.bayar-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:.75rem;color:var(--ab);margin-bottom:10px}
.bayar-actions{display:flex;gap:8px;flex-wrap:wrap}

/* WP DETAIL */
.wp-tung-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg);border:1.5px solid var(--br);margin-bottom:6px}
.wp-cb{accent-color:var(--h2)}

/* SETTINGS GRID */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.mob-open{transform:translateX(0)}
  .main{margin-left:0}
  .settings-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏛️</div>
      <h1>SIPBB Admin Panel</h1>
      <p>Desa Kasomalang Kulon</p>
    </div>
    <div class="err-msg" id="login-err"></div>
    <div class="fg"><label>Username</label><input id="usr" type="text" placeholder="admin" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input id="pwd" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">🔐 Masuk</button>
    <p style="text-align:center;font-size:.73rem;color:var(--ab);margin-top:16px">
      <a href="/" style="color:var(--h2);text-decoration:none">← Kembali ke Portal Desa</a>
    </p>
  </div>
</div>

<!-- APP -->
<div id="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="icon">🏛️</div>
    <h2>SIPBB Admin</h2>
    <p>Desa Kasomalang Kulon</p>
  </div>
  <div class="sb-user">
    <div class="sb-avatar" id="sb-av">A</div>
    <div class="sb-user-info">
      <div class="name" id="sb-name">Admin</div>
      <div class="role" id="sb-role">administrator</div>
    </div>
  </div>
  <nav class="sb-nav" id="sb-nav">
    <!-- Populated by JS based on role -->
  </nav>
  <div class="sb-footer">
    <div class="sb-logout" onclick="doLogout()">🚪 <span>Keluar</span></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="topbar-right">
      <a href="/" target="_blank" style="font-size:.78rem;color:var(--h2);text-decoration:none">🌐 Lihat Website</a>
    </div>
  </div>
  <div class="content" id="content">
    <!-- Page content rendered here -->
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<!-- MODALS -->
<div class="overlay" id="ov-modal"><div class="modal" id="modal-inner"></div></div>

<script>
// ============================================================
// STATE & CONFIG
// ============================================================
const API = '/api';
let token = localStorage.getItem('sipbb_token');
let user = JSON.parse(localStorage.getItem('sipbb_user') || 'null');
let currentPage = '';
let pbbPage = 1;
const PBB_PH = 20;

// ============================================================
// AUTH
// ============================================================
async function doLogin(){
  const usr = document.getElementById('usr').value.trim();
  const pwd = document.getElementById('pwd').value;
  if(!usr||!pwd) return showErr('Username dan password harus diisi');
  try {
    const r = await fetch(`${API}/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:usr, password:pwd})
    });
    const d = await r.json();
    if(!r.ok) return showErr(d.error);
    token = d.token; user = d.user;
    localStorage.setItem('sipbb_token', token);
    localStorage.setItem('sipbb_user', JSON.stringify(user));
    initApp();
  } catch(e){ showErr('Tidak dapat terhubung ke server'); }
}
function showErr(msg){ const e=document.getElementById('login-err'); e.textContent=msg; e.classList.add('show'); }
document.getElementById('pwd').addEventListener('keydown', e=>{if(e.key==='Enter')doLogin()});

function doLogout(){
  token=null; user=null;
  localStorage.removeItem('sipbb_token');
  localStorage.removeItem('sipbb_user');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function authHeaders(){ return {Authorization:`Bearer ${token}`,'Content-Type':'application/json'} }

async function apiFetch(url, opts={}){
  opts.headers = {...(opts.headers||{}), Authorization:`Bearer ${token}`};
  const r = await fetch(API+url, opts);
  if(r.status===401){ doLogout(); return null; }
  return r;
}

// ============================================================
// INIT
// ============================================================
function initApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  // Set user info
  document.getElementById('sb-name').textContent = user.name;
  document.getElementById('sb-role').textContent = user.role;
  document.getElementById('sb-av').textContent = user.name[0].toUpperCase();
  buildNav();
  // Go to first page
  const firstPage = user.role === 'admin' ? 'dashboard' : user.role === 'kolektor' ? 'pbb-daftar' : 'pbb-rt';
  navigate(firstPage);
}

// ============================================================
// NAVIGATION
// ============================================================
const NAV_ITEMS = {
  admin: [
    {id:'dashboard', label:'Dashboard', ico:'📊', section:'Utama'},
    {id:'pbb-daftar', label:'Data Wajib Pajak', ico:'📋', section:'PBB'},
    {id:'pbb-bayar', label:'Verifikasi Pembayaran', ico:'✅'},
    {id:'pengguna', label:'Manajemen Pengguna', ico:'👥', section:'Pengaturan'},
    {id:'konten-berita', label:'Berita & Info', ico:'📰', section:'Konten'},
    {id:'konten-pengumuman', label:'Pengumuman', ico:'📢'},
    {id:'settings', label:'Pengaturan Desa', ico:'⚙️'},
  ],
  kolektor: [
    {id:'pbb-daftar', label:'Data Wajib Pajak', ico:'📋', section:'PBB'},
    {id:'pbb-bayar', label:'Pembayaran Pending', ico:'✅'},
  ],
  rt: [
    {id:'pbb-rt', label:'Data Wajib Pajak RT Saya', ico:'🏘️', section:'PBB'},
    {id:'pbb-upload', label:'Upload Bukti Bayar', ico:'📤'},
  ],
};

function buildNav(){
  const items = NAV_ITEMS[user.role] || [];
  let html = '';
  let lastSection = '';
  items.forEach(item => {
    if(item.section && item.section !== lastSection){
      html += `<div class="sb-section">${item.section}</div>`;
      lastSection = item.section;
    }
    html += `<div class="sb-item" id="nav-${item.id}" onclick="navigate('${item.id}')">
      <span class="ico">${item.ico}</span>${item.label}
    </div>`;
  });
  document.getElementById('sb-nav').innerHTML = html;
}

function navigate(page){
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  const titles = {
    'dashboard':'📊 Dashboard','pbb-daftar':'📋 Data Wajib Pajak',
    'pbb-bayar':'✅ Verifikasi Pembayaran','pbb-rt':'🏘️ Data RT Saya',
    'pbb-upload':'📤 Upload Bukti Bayar','pengguna':'👥 Manajemen Pengguna',
    'konten-berita':'📰 Berita & Informasi','konten-pengumuman':'📢 Pengumuman',
    'settings':'⚙️ Pengaturan Desa'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = {
    'dashboard': renderDashboard,
    'pbb-daftar': renderPBBDaftar,
    'pbb-bayar': renderVerifikasi,
    'pbb-rt': ()=>renderPBBDaftar(true),
    'pbb-upload': renderUpload,
    'pengguna': renderPengguna,
    'konten-berita': renderBerita,
    'konten-pengumuman': renderPengumuman,
    'settings': renderSettings,
  };
  (pages[page] || (()=>{ document.getElementById('content').innerHTML='<p>Halaman tidak ditemukan</p>'; }))();
}

// ============================================================
// HELPERS
// ============================================================
function rp(n){ return 'Rp '+(n||0).toLocaleString('id-ID'); }
function toast(msg, type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'), 3000);
}
function setContent(html){ document.getElementById('content').innerHTML=html; }
function openModal(html){
  document.getElementById('modal-inner').innerHTML=html;
  document.getElementById('ov-modal').classList.add('on');
}
function closeModal(){ document.getElementById('ov-modal').classList.remove('on'); }
document.getElementById('ov-modal').addEventListener('click', e=>{ if(e.target===document.getElementById('ov-modal'))closeModal(); });

function fmt(dt){ if(!dt)return'-'; return new Date(dt).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDt(dt){ if(!dt)return'-'; return new Date(dt).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

// ============================================================
// DASHBOARD
// ============================================================
async function renderDashboard(){
  setContent(`<div class="stat-grid">
    ${[1,2,3,4].map(()=>`<div class="stat-card"><div class="skel" style="height:80px;border-radius:8px"></div></div>`).join('')}
  </div>`);
  try {
    const [dashR, analytR] = await Promise.all([
      apiFetch('/admin/dashboard'),
      apiFetch('/pbb/analytics')
    ]);
    const dash = await dashR.json();
    const anal = await analytR.json();
    const pbb = dash.pbb || {};

async function loadRTFilter(){
  const rw = document.getElementById('f-rw')?.value;
  const sel = document.getElementById('f-rt');
  if(!sel) return;
  sel.innerHTML = '<option value="">Semua RT</option>';
  if(!rw) return;
  const r = await apiFetch(`/pbb/wajib-pajak?rw=${rw}&limit=200`);
  if(!r) return;
  const d = await r.json();
  const rts = [...new Set(d.data.map(x=>x.rt))].sort((a,b)=>isNaN(a)?1:isNaN(b)?-1:a-b);
  rts.forEach(rt=>{
    const o = document.createElement('option');
    o.value=rt; o.textContent=rt==='luar'?'Luar':'RT '+rt;
    sel.appendChild(o);
  });
}

async function loadPBBTable(){
  const params = new URLSearchParams({
    page: pbbPage, limit: PBB_PH,
    ...(pbbFilters.nama?{nama:pbbFilters.nama}:{}),
    ...(pbbFilters.nop?{nop:pbbFilters.nop}:{}),
    ...(pbbFilters.rw?{rw:pbbFilters.rw}:{}),
    ...(pbbFilters.rt?{rt:pbbFilters.rt}:{}),
  });
  const r = await apiFetch(`/pbb/wajib-pajak?${params}`);
  if(!r) return;
  const d = await r.json();
  const DUSUN_RW = {1:['1','2'],2:['3','6'],3:['4','5','7']};
  function getDusun(rw){ for(const[k,v] of Object.entries(DUSUN_RW)) if(v.includes(rw)) return 'Dusun '+['','I','II','III'][k]; return 'Luar'; }

  const tbody = document.getElementById('pbb-tbody');
  if(!d.data?.length){ tbody.innerHTML='<tr class="empty-row"><td colspan="7">Tidak ada data</td></tr>'; return; }

  tbody.innerHTML = d.data.map(wp => {
    const tahunBelum = wp.tahun_belum ? wp.tahun_belum.split(',').filter(Boolean) : [];
    return `<tr>
      <td class="bold">${wp.nama}</td>
      <td class="mono">${wp.nop}</td>
      <td>${wp.rw==='luar'?'<span class="badge badge-gray">Luar</span>':`RT ${wp.rt}/RW ${wp.rw}`}</td>
      <td>${getDusun(wp.rw)}</td>
      <td>${tahunBelum.map(t=>`<span class="badge badge-red">${t}</span>`).join(' ')||'<span class="badge badge-green">Lunas</span>'}</td>
      <td style="font-weight:700;color:${wp.total_belum>0?'var(--r)':'var(--h2)'}">${rp(wp.total_belum)}</td>
      <td><button class="btn btn-outline btn-xs" onclick="openWPDetail(${wp.id})">Detail</button></td>
    </tr>`;
  }).join('');

  // Pagination
  const total = d.total || 0;
  const totPages = Math.ceil(total / PBB_PH);
  const pgEl = document.getElementById('pbb-pg');
  if(totPages <= 1){ pgEl.innerHTML=''; return; }
  const pages = [];
  for(let i=1;i<=totPages;i++) if(i===1||i===totPages||Math.abs(i-pbbPage)<=2) pages.push(i); else if(pages[pages.length-1]!=='...') pages.push('...');
  pgEl.innerHTML = `<button onclick="pbbPage--;loadPBBTable()" ${pbbPage===1?'disabled':''}>← Prev</button>`
    + pages.map(p=>p==='...'?'<span style="padding:0 4px">…</span>':`<button class="${p===pbbPage?'on':''}" onclick="pbbPage=${p};loadPBBTable()">${p}</button>`).join('')
    + `<button onclick="pbbPage++;loadPBBTable()" ${pbbPage===totPages?'disabled':''}>Next →</button>`
    + `<span class="pg-info">${total} data · Hal ${pbbPage}/${totPages}</span>`;
}

function previewFile(input){
  const f = input.files[0];
  const prev = document.getElementById('file-preview');
  if(f){ prev.textContent = `✅ ${f.name} (${(f.size/1024).toFixed(0)} KB)`; prev.style.display='block'; }
}

async function submitBayar(){
  const wpId = document.getElementById('up-wp-id').value;
  const jumlah = document.getElementById('up-jumlah').value;
  const catatan = document.getElementById('up-catatan').value;
  const file = document.getElementById('up-file').files[0];
  if(!jumlah||parseInt(jumlah)<=0) return toast('Jumlah bayar harus diisi','err');

  // Get checked tunggakan
  const checkedIds = [...document.querySelectorAll('.wp-cb:checked')].map(c=>c.value);
  if(!checkedIds.length) return toast('Pilih tunggakan yang dibayar','err');

  const fd = new FormData();
  fd.append('wp_id', wpId);
  fd.append('tunggakan_ids', JSON.stringify(checkedIds));
  fd.append('jumlah_bayar', jumlah);
  fd.append('catatan', catatan);
  if(file) fd.append('bukti', file);

  const r = await fetch(`${API}/pbb/pembayaran`, {
    method:'POST', headers:{Authorization:`Bearer ${token}`}, body:fd
  });
  const d = await r.json();
  if(!r.ok) return toast(d.error, 'err');
  toast('Bukti pembayaran berhasil diupload! Menunggu verifikasi admin.', 'ok');
  closeModal();
}

async function renderVerifikasi(){

      <button class="btn ${verStatus==='pending'?'btn-primary':'btn-outline'} btn-sm" onclick="verStatus='pending';verPage=1;renderVerifikasi()">⏳ Pending</button>

      <button class="btn ${verStatus==='rejected'?'btn-primary':'btn-outline'} btn-sm" onclick="verStatus='rejected';verPage=1;renderVerifikasi()">❌ Ditolak</button>
    </div>

async function loadVerifikasi(){
  const r = await apiFetch(`/pbb/pembayaran?status=${verStatus}&page=${verPage}&limit=15`);
  if(!r) return;
  const d = await r.json();
  const list = document.getElementById('ver-list');
  if(!d.data?.length){ list.innerHTML='<div class="panel"><div class="panel-body" style="text-align:center;padding:40px;color:var(--ab)">Tidak ada pembayaran berstatus ini</div></div>'; return; }

  list.innerHTML = d.data.map(p => `
    <div class="bayar-card ${p.status} panel" style="margin-bottom:12px">
      <div class="panel-hd">
        <div>
          <div class="bayar-nama">${p.nama}</div>
          <div class="bayar-nop">${p.nop} · RT ${p.rt}/RW ${p.rw}</div>
        </div>
        <span class="badge badge-${p.status==='approved'?'green':p.status==='pending'?'orange':'red'}">${p.status.toUpperCase()}</span>
      </div>
      <div class="panel-body">
        <div class="bayar-meta">
          <span>💰 ${rp(p.jumlah_bayar)}</span>
          <span>📅 ${fmtDt(p.created_at)}</span>
          <span>👤 ${p.uploader_name}</span>
          ${p.catatan?`<span>📝 ${p.catatan}</span>`:''}
        </div>
        ${p.bukti_file?`<a href="/uploads/${p.bukti_file}" target="_blank" class="btn btn-outline btn-xs" style="margin-bottom:10px;display:inline-flex">📎 Lihat Bukti Bayar</a>`:'<p style="font-size:.75rem;color:var(--ab);margin-bottom:10px">Tidak ada bukti file</p>'}
        ${p.status==='pending'&&user.role==='admin'?`
          <div class="bayar-actions">
            <button class="btn btn-primary btn-sm" onclick="reviewBayar(${p.id},'approved')">✅ Setujui</button>
            <button class="btn btn-danger btn-sm" onclick="askReject(${p.id})">❌ Tolak</button>
          </div>`:p.rejection_reason?`<p style="font-size:.78rem;color:var(--r)">❌ Alasan ditolak: ${p.rejection_reason}</p>`:''}
      </div>
    </div>`).join('');

  const totPages = Math.ceil(d.total/15);
  const pgEl = document.getElementById('ver-pg');
  if(totPages<=1){pgEl.innerHTML='';return;}
  pgEl.innerHTML=`<button onclick="verPage--;loadVerifikasi()" ${verPage===1?'disabled':''}>← Prev</button>
    <span class="pg-info">Hal ${verPage}/${totPages} · ${d.total} data</span>
    <button onclick="verPage++;loadVerifikasi()" ${verPage===totPages?'disabled':''}>Next →</button>`;
}

async function reviewBayar(id, action, reason=''){
  const r = await apiFetch(`/pbb/pembayaran/${id}/review`, {
    method:'PUT', headers:authHeaders(),
    body: JSON.stringify({action, rejection_reason:reason})
  });
  const d = await r.json();
  if(!r.ok) return toast(d.error,'err');
  toast(d.message,'ok');
  closeModal();
  loadVerifikasi();
}

      <div id="rt-field" style="display:none">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="fg"><label>No RT</label><input id="u-rt" placeholder="01"></div>
          <div class="fg"><label>No RW</label><input id="u-rw" placeholder="01"></div>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveUser()">Simpan</button>
    </div>
  `);
}

function toggleRTField(){
  const role = document.getElementById('u-role')?.value;
  const field = document.getElementById('rt-field');
  if(field) field.style.display = role==='rt'?'block':'none';
}

async function saveUser(){
  const body = {
    name:document.getElementById('u-name').value,
    username:document.getElementById('u-usr').value,
    password:document.getElementById('u-pwd').value,
    role:document.getElementById('u-role').value,
    rt:document.getElementById('u-rt')?.value||null,
    rw:document.getElementById('u-rw')?.value||null,
  };
  if(!body.name||!body.username||!body.password) return toast('Lengkapi semua field','err');
  const r = await apiFetch('/admin/users',{method:'POST',headers:authHeaders(),body:JSON.stringify(body)});
  const d = await r.json();
  if(!r.ok) return toast(d.error,'err');
  toast('Pengguna berhasil ditambahkan','ok');
  closeModal(); loadUsers();
}

function openEditUser(u){
  if(typeof u === 'string') u = JSON.parse(u);
  openModal(`
    <div class="modal-hd"><h3>Edit Pengguna — ${u.name}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="fg"><label>Nama Lengkap</label><input id="eu-name" value="${u.name}"></div>
      <div class="fg"><label>Password Baru (kosongkan jika tidak diubah)</label><input type="password" id="eu-pwd" placeholder="Biarkan kosong"></div>
      <div class="fg"><label>Status</label>
        <select id="eu-active"><option value="1" ${u.active?'selected':''}>Aktif</option><option value="0" ${!u.active?'selected':''}>Nonaktif</option></select>
      </div>
      ${u.role==='rt'?`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="fg"><label>No RT</label><input id="eu-rt" value="${u.rt||''}"></div>
          <div class="fg"><label>No RW</label><input id="eu-rw" value="${u.rw||''}"></div>
        </div>`:'' }
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="updateUser(${u.id},'${u.role}')">Simpan Perubahan</button>
    </div>
  `);
}

async function updateUser(id, role){
  const body = {
    name:document.getElementById('eu-name').value,
    active:parseInt(document.getElementById('eu-active').value),
  };
  const pwd = document.getElementById('eu-pwd')?.value;
  if(pwd) body.password = pwd;
  if(role==='rt'){
    body.rt = document.getElementById('eu-rt')?.value||null;
    body.rw = document.getElementById('eu-rw')?.value||null;
  }
  const r = await apiFetch(`/admin/users/${id}`,{method:'PUT',headers:authHeaders(),body:JSON.stringify(body)});
  const d = await r.json();
  if(!r.ok) return toast(d.error,'err');
  toast('Pengguna berhasil diperbarui','ok');
  closeModal(); loadUsers();
}

async function deleteUser(id, name){
  if(!confirm(`Hapus pengguna "${name}"?`)) return;
  const r = await apiFetch(`/admin/users/${id}`,{method:'DELETE',headers:authHeaders()});
  const d = await r.json();
  if(!r.ok) return toast(d.error,'err');
  toast('Pengguna dihapus','ok'); loadUsers();
}

// ============================================================
// KONTEN - BERITA
// ============================================================
async function renderBerita(){
  setContent(`
    <div class="panel">
      <div class="panel-hd"><h3>Manajemen Berita</h3><button class="btn btn-primary btn-sm" onclick="openAddBerita()">+ Tambah Berita</button></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Judul</th><th>Kategori</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead>
          <tbody id="berita-tbody"></tbody>
        </table>
      </div>
    </div>
  `);
  const r = await apiFetch('/admin/berita');
  if(!r) return;
  const data = await r.json();
  document.getElementById('berita-tbody').innerHTML = data.length
    ? data.map(b=>`<tr>
        <td class="bold">${b.judul}</td>
        <td><span class="badge badge-blue">${b.kategori}</span></td>
        <td><span class="badge badge-${b.active?'green':'gray'}">${b.active?'Aktif':'Draft'}</span></td>
        <td>${fmt(b.created_at)}</td>
        <td>
          <button class="btn btn-outline btn-xs" onclick="openEditBerita(${b.id})">Edit</button>
          <button class="btn btn-danger btn-xs" onclick="deleteBerita(${b.id})">Hapus</button>
        </td>
      </tr>`).join('')
    : '<tr class="empty-row"><td colspan="5">Belum ada berita. Tambahkan yang pertama!</td></tr>';
}

function openAddBerita(){
  openModal(`
    <div class="modal-hd"><h3>📰 Tambah Berita</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="fg"><label>Judul</label><input id="b-judul" placeholder="Judul berita..."></div>
      <div class="fg"><label>Ringkasan</label><input id="b-ring" placeholder="Singkat, maks 150 karakter..."></div>
      <div class="fg"><label>Isi Berita</label><textarea id="b-isi" style="min-height:120px" placeholder="Tulis isi berita lengkap..."></textarea></div>
      <div class="fg"><label>Kategori</label>
        <select id="b-kat"><option value="berita">Berita</option><option value="kegiatan">Kegiatan</option><option value="pembangunan">Pembangunan</option><option value="kesehatan">Kesehatan</option></select>
      </div>
      <div class="fg"><label>Gambar (Opsional)</label><input type="file" id="b-img" accept="image/*"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveBerita()">Simpan & Publikasi</button>
    </div>
  `);
}

async function saveBerita(){
  const fd = new FormData();
  fd.append('judul', document.getElementById('b-judul').value);
  fd.append('ringkasan', document.getElementById('b-ring').value);
  fd.append('isi', document.getElementById('b-isi').value);
  fd.append('kategori', document.getElementById('b-kat').value);
  const img = document.getElementById('b-img').files[0];
  if(img) fd.append('gambar', img);
  if(!fd.get('judul')||!fd.get('isi')) return toast('Judul dan isi wajib diisi','err');
  const r = await fetch(`${API}/admin/berita`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
  const d = await r.json();
  if(!r.ok) return toast(d.error,'err');
  toast('Berita berhasil ditambahkan','ok'); closeModal(); renderBerita();
}

async function deleteBerita(id){
  if(!confirm('Hapus berita ini?')) return;
  const r = await apiFetch(`/admin/berita/${id}`,{method:'DELETE',headers:authHeaders()});
  toast('Berita dihapus','ok'); renderBerita();
}

function openAddPengumuman(){

    <div class="modal-hd"><h3>📢 Tambah Pengumuman</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="fg"><label>Judul</label><input id="pj" placeholder="Judul pengumuman..."></div>
      <div class="fg"><label>Isi Pengumuman</label><textarea id="pi" style="min-height:100px" placeholder="Isi pengumuman..."></textarea></div>
      <div class="fg"><label>Kategori</label>
        <select id="pk"><option value="umum">Umum</option><option value="kesehatan">Kesehatan</option><option value="pbb">PBB</option><option value="pembangunan">Pembangunan</option><option value="pendidikan">Pendidikan</option></select>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="savePeng()">Simpan</button>

async function savePeng(){
  const body = {judul:document.getElementById('pj').value,isi:document.getElementById('pi').value,kategori:document.getElementById('pk').value};
  if(!body.judul||!body.isi) return toast('Judul dan isi wajib','err');

  const d = await r.json();
  if(!r.ok) return toast(d.error,'err');
  toast('Pengumuman ditambahkan','ok'); closeModal(); renderPengumuman();
}

async function deletePeng(id){
  if(!confirm('Hapus pengumuman ini?')) return;
  await apiFetch(`/admin/pengumuman/${id}`,{method:'DELETE',headers:authHeaders()});
  toast('Dihapus','ok'); renderPengumuman();
}

            <div class="fg"><label>Motto/Tagline</label><input name="desa_motto" value="${s.desa_motto||''}"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-hd"><h3>📊 Data Statistik</h3></div>
          <div class="panel-body" style="display:flex;flex-direction:column;gap:12px">
            <div class="fg"><label>Jumlah Penduduk</label><input name="desa_penduduk" value="${s.desa_penduduk||''}"></div>
            <div class="fg"><label>Jumlah KK</label><input name="desa_kk" value="${s.desa_kk||''}"></div>
            <div class="fg"><label>Jumlah RW</label><input name="desa_rw" value="${s.desa_rw||''}"></div>
            <div class="fg"><label>Jumlah RT</label><input name="desa_rt" value="${s.desa_rt||''}"></div>
            <div class="fg"><label>Luas Wilayah</label><input name="desa_luas" value="${s.desa_luas||''}"></div>
            <div class="fg"><label>Tahun PBB Aktif</label><input name="pbb_tahun_aktif" value="${s.pbb_tahun_aktif||'2025'}"></div>
          </div>
        </div>
      </div>
      <div class="panel" style="margin-top:0">
        <div class="panel-hd"><h3>🎯 Visi & Misi</h3></div>
        <div class="panel-body" style="display:flex;flex-direction:column;gap:12px">
          <div class="fg"><label>Visi Desa</label><textarea name="desa_visi" style="min-height:70px">${s.desa_visi||''}</textarea></div>
          <div class="fg"><label>Misi Desa (pisahkan dengan tanda |)</label><textarea name="desa_misi" style="min-height:100px">${s.desa_misi||''}</textarea></div>

  `);
}

async function saveSettings(e){
  e.preventDefault();
  const form = e.target;
  const body = {};
  new FormData(form).forEach((v,k)=>body[k]=v);
  const r = await apiFetch('/admin/settings',{method:'PUT',headers:authHeaders(),body:JSON.stringify(body)});
  const d = await r.json();
  if(!r.ok) return toast(d.error,'err');
  toast('✅ Pengaturan berhasil disimpan!','ok');
}
